# Go API (api-go) + Postgres + Redis.
#
# Запуск: скопируй .env.example в .env, задай POSTGRES_* и при необходимости секреты.
# Миграции БД (Prisma, только SQL из prisma/migrations): docker compose --profile migrate run --rm prisma-migrate
#
# API: http://localhost:${PORT:-3000}  Swagger: /docs/index.html

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medvito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medvito}
      POSTGRES_DB: ${POSTGRES_DB:-medvito}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$$REDIS_PASSWORD"; else exec redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

  api:
    build:
      context: ./api-go
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: "3000"
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-medvito}:${POSTGRES_PASSWORD:-medvito}@postgres:5432/${POSTGRES_DB:-medvito}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      MTS_TOKEN: ${MTS_TOKEN:-}
      NOTISEND_API_KEY: ${NOTISEND_API_KEY:-}
      NOTISEND_PROJECT: ${NOTISEND_PROJECT:-torgui_sam}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      TINKOFF_TERMINAL_KEY: ${TINKOFF_TERMINAL_KEY:-}
      TINKOFF_SECRET_KEY: ${TINKOFF_SECRET_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-}
      S3_PUBLIC_BASE: ${S3_PUBLIC_BASE:-}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # Одноразовый контейнер: prisma migrate deploy (нужен package-lock.json в корне).
  prisma-migrate:
    profiles: ["migrate"]
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medvito}:${POSTGRES_PASSWORD:-medvito}@postgres:5432/${POSTGRES_DB:-medvito}?sslmode=disable
    command: >
      sh -c "npm ci && npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
