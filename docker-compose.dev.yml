services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medvito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medvito}
      POSTGRES_DB: ${POSTGRES_DB:-medvito}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    image: postgres:17-alpine
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT_INTERNAL: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-medvito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medvito}
      POSTGRES_DB: ${POSTGRES_DB:-medvito}
    volumes:
      - ./dumps:/dumps:ro
      - ./docker/postgres/init-db.sh:/init-db.sh:ro
    entrypoint: ["/bin/sh", "/init-db.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_network

  redis:
    image: redis:7-alpine
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$$REDIS_PASSWORD"; else exec redis-server; fi'
    volumes:
      - redis_data:/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api-go
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: "3000"
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-medvito}:${POSTGRES_PASSWORD:-medvito}@postgres:5432/${POSTGRES_DB:-medvito}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      MTS_TOKEN: ${MTS_TOKEN:-}
      NOTISEND_API_KEY: ${NOTISEND_API_KEY:-}
      NOTISEND_PROJECT: ${NOTISEND_PROJECT:-torgui_sam}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      AI_MODERATION_ENABLED: ${AI_MODERATION_ENABLED:-false}
      AI_MODERATION_POLL_INTERVAL_SECONDS: ${AI_MODERATION_POLL_INTERVAL_SECONDS:-30}
      AI_MODERATION_BATCH_SIZE: ${AI_MODERATION_BATCH_SIZE:-5}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      TINKOFF_TERMINAL_KEY: ${TINKOFF_TERMINAL_KEY:-}
      TINKOFF_SECRET_KEY: ${TINKOFF_SECRET_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-}
      S3_PUBLIC_BASE: ${S3_PUBLIC_BASE:-}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - backend_network

volumes:
  postgres_data:
  redis_data:

networks:
  backend_network:

